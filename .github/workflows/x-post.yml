name: X Auto-Post

# Vercel crons are the PRIMARY scheduler (vercel.json).
# This workflow is ONLY for manual triggers via workflow_dispatch.
# DO NOT add schedule: entries here — that causes duplicate posts.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Post mode'
        required: true
        default: 'dcf'
        type: choice
        options: [earnings, dcf, dcf2, dcf_bear, macro, news, feature, weekly_wrap, question, etf_pulse, sentiment, morning_brief, midday_pulse, market_close, market_open, sector_spotlight, pre_close, after_hours, theory_overnight, earnings_results, economic_results, holiday_deep_dive, sector_scan, insider_buy, low_52w, top_undervalued, market_vs_model, ratio_explained, li_valuation, li_market_wrap, li_deep_dive, li_sector_scan]
      ticker:
        description: 'Ticker override (dcf / dcf2 / dcf_bear modes only)'
        required: false
      dry_run:
        description: 'Dry run (print without posting)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Post to X
        env:
          MODE:               ${{ github.event.inputs.mode }}
          TICKER:             ${{ github.event.inputs.ticker }}
          DRY_RUN:            ${{ github.event.inputs.dry_run }}
          APP_URL:            https://insic.app
          BUFFER_API_KEY:      ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID:   ${{ secrets.BUFFER_CHANNEL_ID }}
          LINKEDIN_CHANNEL_ID: ${{ secrets.LINKEDIN_CHANNEL_ID }}
          ALPHA_VANTAGE_KEY:   ${{ secrets.ALPHA_VANTAGE_KEY }}
          AUTOMATION_API_KEY:  ${{ secrets.AUTOMATION_API_KEY }}
          FINNHUB_KEY:         ${{ secrets.FINNHUB_KEY }}
        run: node scripts/x-post.mjs
