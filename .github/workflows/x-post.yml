name: X Auto-Post

# X/Twitter posts run here (NOT Vercel) — Vercel Hobby silently drops crons beyond 2 entries.
# GitHub Actions free plan: unlimited scheduled workflows.
# Mode is determined by HOUR:DOW — one unambiguous case per time slot.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Post mode'
        required: true
        default: 'dcf'
        type: choice
        options: [earnings, dcf, dcf2, dcf_bear, macro, news, feature, weekly_wrap, question,
                  etf_pulse, sentiment, morning_brief, midday_pulse, market_close, market_open,
                  sector_spotlight, pre_close, after_hours, theory_overnight, earnings_results,
                  economic_results, holiday_deep_dive, sector_scan, insider_buy, low_52w,
                  top_undervalued, market_vs_model, ratio_explained, movers, undervalued_list,
                  sector_undervalued, biggest_losers_day, biggest_winners_day, ytd_losers,
                  ytd_winners, near_52w_high, most_shorted, conviction_score,
                  etf_vs_etf, profit_forecast_list, etf_ratio_breakdown,
                  sector_momentum_rank, dcf_vs_analyst_framed]
      ticker:
        description: 'Ticker override (dcf/dcf2/dcf_bear only)'
        required: false
      dry_run:
        description: 'Dry run'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

  # Single dispatcher cron — fires every 15 min, maps time→mode internally.
  # One schedule entry registers instantly; many entries can take 24h+ to activate.
  schedule:
    - cron: '*/15 * * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Resolve mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
            echo "ticker=${{ github.event.inputs.ticker }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            DOW=$(date -u +%u)  # 1=Mon…5=Fri, 6=Sat, 7=Sun
            echo "Cron fired at UTC ${HOUR}:${MIN} DOW=${DOW}"

            # Route by day of week using string equality (avoids -ge/-le issues with DOW=7)
            if [ "$DOW" = "1" ] || [ "$DOW" = "2" ] || [ "$DOW" = "3" ] || [ "$DOW" = "4" ] || [ "$DOW" = "5" ]; then
              # Weekdays Mon-Fri
              if   [ "$HOUR" = "11" ]; then MODE="morning_brief"
              elif [ "$HOUR" = "12" ]; then MODE="earnings"
              elif [ "$HOUR" = "13" ] && [ "$MIN" -lt "20" ]; then MODE="feature"
              elif [ "$HOUR" = "13" ] && [ "$MIN" -ge "29" ]; then MODE="market_open"
              elif [ "$HOUR" = "14" ] && [ "$MIN" -lt "20" ]; then MODE="dcf"
              elif [ "$HOUR" = "14" ] && [ "$MIN" -ge "29" ]; then MODE="sector_spotlight"
              elif [ "$HOUR" = "15" ] && [ "$MIN" -lt "20" ]; then MODE="midday_pulse"
              elif [ "$HOUR" = "15" ] && [ "$MIN" -ge "29" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="ratio_explained"
              elif [ "$HOUR" = "16" ] && [ "$MIN" -lt "20" ]; then MODE="macro"
              elif [ "$HOUR" = "16" ] && [ "$MIN" -ge "29" ]; then MODE="dcf2"
              elif [ "$HOUR" = "17" ] && [ "$MIN" -lt "20" ]; then MODE="etf_pulse"
              elif [ "$HOUR" = "17" ] && [ "$MIN" -ge "29" ]; then MODE="economic_results"
              elif [ "$HOUR" = "18" ] && [ "$MIN" -lt "10" ]; then MODE="dcf_bear"
              elif [ "$HOUR" = "18" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ]; then MODE="movers"
              elif [ "$HOUR" = "18" ] && [ "$MIN" -ge "29" ]; then MODE="pre_close"
              elif [ "$HOUR" = "19" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "1" ] || [ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="insider_buy"
              elif [ "$HOUR" = "19" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="low_52w"
              elif [ "$HOUR" = "19" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ]; then MODE="undervalued_list"
              elif [ "$HOUR" = "19" ] && [ "$MIN" -ge "29" ]; then MODE="sector_undervalued"
              elif [ "$HOUR" = "20" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "1" ] || [ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="conviction_score"
              elif [ "$HOUR" = "20" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="biggest_winners_day"
              elif [ "$HOUR" = "20" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ]; then MODE="market_close"
              elif [ "$HOUR" = "20" ] && [ "$MIN" -ge "29" ] && ([ "$DOW" = "1" ] || [ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="biggest_losers_day"
              elif [ "$HOUR" = "21" ] && [ "$MIN" -lt "20" ]; then MODE="after_hours"
              elif [ "$HOUR" = "21" ] && [ "$MIN" -ge "29" ]; then MODE="near_52w_high"
              elif [ "$HOUR" = "22" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="etf_vs_etf"
              elif [ "$HOUR" = "22" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="profit_forecast_list"
              elif [ "$HOUR" = "22" ] && [ "$MIN" -lt "10" ] && [ "$DOW" = "1" ]; then MODE="dcf_vs_analyst_framed"
              elif [ "$HOUR" = "22" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ]; then MODE="etf_ratio_breakdown"
              elif [ "$HOUR" = "23" ]; then MODE="earnings_results"
              elif [ "$HOUR" = "1" ]; then MODE="theory_overnight"
              else MODE="SKIP"
              fi
            elif [ "$DOW" = "6" ]; then
              # Saturday
              if   [ "$HOUR" = "13" ]; then MODE="etf_pulse"
              elif [ "$HOUR" = "14" ]; then MODE="feature"
              elif [ "$HOUR" = "15" ]; then MODE="weekly_wrap"
              elif [ "$HOUR" = "16" ]; then MODE="sector_scan"
              elif [ "$HOUR" = "17" ]; then MODE="dcf"
              elif [ "$HOUR" = "18" ]; then MODE="sentiment"
              elif [ "$HOUR" = "19" ]; then MODE="ratio_explained"
              elif [ "$HOUR" = "20" ]; then MODE="sector_momentum_rank"
              elif [ "$HOUR" = "2"  ]; then MODE="theory_overnight"
              else MODE="SKIP"
              fi
            elif [ "$DOW" = "7" ]; then
              # Sunday
              if   [ "$HOUR" = "13" ]; then MODE="sentiment"
              elif [ "$HOUR" = "14" ] && [ "$MIN" -lt "20" ]; then MODE="top_undervalued"
              elif [ "$HOUR" = "14" ] && [ "$MIN" -ge "29" ]; then MODE="question"
              elif [ "$HOUR" = "15" ]; then MODE="sector_scan"
              elif [ "$HOUR" = "16" ]; then MODE="etf_pulse"
              elif [ "$HOUR" = "17" ]; then MODE="dcf_vs_analyst_framed"
              elif [ "$HOUR" = "2"  ]; then MODE="theory_overnight"
              else MODE="SKIP"
              fi
            else
              MODE="SKIP"
            fi

            if [ "$MODE" = "SKIP" ] || [ -z "$MODE" ]; then
              echo "No matching mode for UTC ${HOUR}:${MIN} DOW=${DOW} — skipping"
              exit 0
            fi

            echo "mode=${MODE}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "ticker=" >> $GITHUB_OUTPUT
          fi

      - name: Post to X
        if: steps.mode.outputs.mode != ''
        env:
          MODE:                        ${{ steps.mode.outputs.mode }}
          TICKER:                      ${{ steps.mode.outputs.ticker }}
          DRY_RUN:                     ${{ steps.mode.outputs.dry_run }}
          APP_URL:                     https://insic.app
          BUFFER_API_KEY:              ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID:           ${{ secrets.BUFFER_CHANNEL_ID }}
          LINKEDIN_CHANNEL_ID:         ${{ secrets.LINKEDIN_CHANNEL_ID }}
          ALPHA_VANTAGE_KEY:           ${{ secrets.ALPHA_VANTAGE_KEY }}
          AUTOMATION_API_KEY:          ${{ secrets.AUTOMATION_API_KEY }}
          FINNHUB_KEY:                 ${{ secrets.FINNHUB_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:    ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/x-post.mjs
