name: X Auto-Post

# X/Twitter posts — one explicit cron entry per mode.
# This is the ONLY reliable approach on GitHub Actions free tier.
# A single */15 dispatcher was unreliable (3-5 fires/day instead of 96).
# Mode is detected by matching the cron's exact UTC hour:minute:DOW.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Post mode'
        required: true
        default: 'dcf'
        type: choice
        options: [earnings, dcf, dcf2, dcf_bear, macro, news, feature, weekly_wrap, question,
                  etf_pulse, sentiment, morning_brief, midday_pulse, market_close, market_open,
                  sector_spotlight, pre_close, after_hours, theory_overnight, earnings_results,
                  economic_results, holiday_deep_dive, sector_scan, insider_buy, low_52w,
                  top_undervalued, market_vs_model, ratio_explained, movers, undervalued_list,
                  sector_undervalued, biggest_losers_day, biggest_winners_day, ytd_losers,
                  ytd_winners, near_52w_high, most_shorted, conviction_score,
                  etf_vs_etf, profit_forecast_list, etf_ratio_breakdown,
                  sector_momentum_rank, dcf_vs_analyst_framed,
                  lowest_pe, lowest_peg, analyst_top_buys, highest_upside_consensus,
                  high_roic_cheap, dividend_value, weekly_followup, quality_rank,
                  overvalued_list, sector_pe_rank, momentum_leaders, earnings_week_preview,
                  value_vs_growth, cash_rich, daily_list_rotation, morning_stock_pick,
                  calendar_today, calendar_tomorrow, macro_preview,
                  rate_impact, sector_catalyst, earnings_surprise_hist,
                  european_open]
      ticker:
        description: 'Ticker override (dcf/dcf2/dcf_bear only)'
        required: false
      dry_run:
        description: 'Dry run'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

  schedule:
    # ── European morning block (5AM–7:30AM ART = 8AM–10:30AM CEST) ──────────
    # Targets European pre-market + open. List/engagement formats work best
    # here — no live US market data needed, pure fundamentals and rankings.
    - cron: '0 8 * * 1-5'     # 05:00 ART european_open (overnight + EU data)
    - cron: '30 8 * * 1-5'    # 05:30 ART undervalued_list (EU audience peak)
    - cron: '0 9 * * 1-5'     # 06:00 ART calendar_today
    - cron: '30 9 * * 1-5'    # 06:30 ART daily_list_rotation
    - cron: '0 10 * * 1-5'    # 07:00 ART sector_pe_rank
    # ── Weekdays Mon-Fri ──────────────────────────────────────────────────────
    - cron: '0 11 * * 1-5'    # 08:00 ART morning_brief
    - cron: '30 11 * * 1-5'   # 08:30 ART morning_stock_pick
    - cron: '0 12 * * 1-5'    # 09:00 ART earnings
    - cron: '0 13 * * 1-5'    # 10:00 ART feature
    - cron: '30 13 * * 1-5'   # 10:30 ART market_open
    - cron: '0 14 * * 1-5'    # 11:00 ART dcf
    - cron: '30 14 * * 1-5'   # 11:30 ART sector_spotlight
    - cron: '0 15 * * 1-5'    # 12:00 ART midday_pulse
    - cron: '15 15 * * 2,4'   # 12:15 ART market_vs_model (Tue/Thu)
    - cron: '30 15 * * 2,4'   # 12:30 ART ratio_explained (Tue/Thu)
    - cron: '45 15 * * 1-5'   # 12:45 ART earnings_week_preview
    - cron: '0 16 * * 1-5'    # 13:00 ART macro
    - cron: '30 16 * * 1-5'   # 13:30 ART dcf2
    - cron: '0 17 * * 1-5'    # 14:00 ART etf_pulse
    - cron: '30 17 * * 1-5'   # 14:30 ART economic_results
    - cron: '0 18 * * 1-5'    # 15:00 ART dcf_bear
    - cron: '15 18 * * 1-5'   # 15:15 ART movers
    - cron: '30 18 * * 1-5'   # 15:30 ART pre_close
    - cron: '45 18 * * 1-5'   # 15:45 ART value_vs_growth
    - cron: '0 19 * * 1,3,5'  # 16:00 ART insider_buy (Mon/Wed/Fri)
    - cron: '0 19 * * 2,4'    # 16:00 ART low_52w (Tue/Thu)
    - cron: '15 19 * * 1-5'   # 16:15 ART undervalued_list
    - cron: '30 19 * * 1-5'   # 16:30 ART sector_undervalued
    - cron: '45 19 * * 1-5'   # 16:45 ART overvalued_list
    - cron: '0 20 * * 1,3,5'  # 17:00 ART conviction_score (Mon/Wed/Fri)
    - cron: '0 20 * * 2,4'    # 17:00 ART biggest_winners_day (Tue/Thu)
    - cron: '15 20 * * 1-5'   # 17:15 ART market_close
    - cron: '30 20 * * 1,3,5' # 17:30 ART biggest_losers_day (Mon/Wed/Fri)
    - cron: '45 20 * * 1-5'   # 17:45 ART momentum_leaders
    - cron: '0 21 * * 1-5'    # 18:00 ART after_hours
    - cron: '15 21 * * 1-5'   # 18:15 ART cash_rich
    - cron: '30 21 * * 1-5'   # 18:30 ART near_52w_high
    - cron: '45 21 * * 1-5'   # 18:45 ART weekly_followup
    - cron: '0 22 * * 1'      # 19:00 ART dcf_vs_analyst_framed (Mon)
    - cron: '0 22 * * 2,4'    # 19:00 ART etf_vs_etf (Tue/Thu)
    - cron: '0 22 * * 3,5'    # 19:00 ART profit_forecast_list (Wed/Fri)
    - cron: '15 22 * * 1-5'   # 19:15 ART etf_ratio_breakdown
    - cron: '30 22 * * 1-5'   # 19:30 ART daily_list_rotation
    - cron: '45 22 * * 1-5'   # 19:45 ART dividend_value
    - cron: '0 23 * * 1-5'    # 20:00 ART earnings_results
    - cron: '15 23 * * 1-5'   # 20:15 ART sector_pe_rank
    - cron: '0 0 * * 2-6'     # 21:00 ART quality_rank
    - cron: '0 1 * * 2-6'     # 22:00 ART theory_overnight
    # ── New calendar-focused modes ────────────────────────────────────────────
    - cron: '30 10 * * 1-5'   # 07:30 ART calendar_today (daily Mon-Fri)
    - cron: '30 0 * * 2-5'    # 21:30 ART calendar_tomorrow (Mon-Thu fires 00:30 UTC next day)
    - cron: '45 11 * * 1-5'   # 08:45 ART macro_preview (daily Mon-Fri)
    - cron: '30 23 * * 2,4'   # 20:30 ART rate_impact (Tue/Thu)
    - cron: '30 12 * * 1,3'   # 09:30 ART sector_catalyst (Mon/Wed)
    - cron: '45 23 * * 3,5'   # 20:45 ART earnings_surprise_hist (Wed/Fri)
    # ── Saturday ──────────────────────────────────────────────────────────────
    - cron: '0 13 * * 6'      # 10:00 ART etf_pulse
    - cron: '0 14 * * 6'      # 11:00 ART feature
    - cron: '30 14 * * 6'     # 11:30 ART momentum_leaders
    - cron: '0 15 * * 6'      # 12:00 ART weekly_wrap
    - cron: '30 15 * * 6'     # 12:30 ART overvalued_list
    - cron: '0 16 * * 6'      # 13:00 ART sector_scan
    - cron: '30 16 * * 6'     # 13:30 ART analyst_top_buys
    - cron: '0 17 * * 6'      # 14:00 ART dcf
    - cron: '30 17 * * 6'     # 14:30 ART cash_rich
    - cron: '0 18 * * 6'      # 15:00 ART sentiment
    - cron: '30 18 * * 6'     # 15:30 ART value_vs_growth
    - cron: '0 19 * * 6'      # 16:00 ART ratio_explained
    - cron: '30 19 * * 6'     # 16:30 ART high_roic_cheap
    - cron: '0 20 * * 6'      # 17:00 ART sector_momentum_rank
    - cron: '30 20 * * 6'     # 17:30 ART quality_rank
    - cron: '0 21 * * 6'      # 18:00 ART earnings_week_preview
    - cron: '30 21 * * 6'     # 18:30 ART sector_pe_rank
    - cron: '0 2 * * 6'       # 23:00 ART theory_overnight
    # ── Sunday ────────────────────────────────────────────────────────────────
    - cron: '0 13 * * 0'      # 10:00 ART sentiment
    - cron: '30 13 * * 0'     # 10:30 ART undervalued_list
    - cron: '0 14 * * 0'      # 11:00 ART top_undervalued
    - cron: '30 14 * * 0'     # 11:30 ART question
    - cron: '0 15 * * 0'      # 12:00 ART sector_scan
    - cron: '30 15 * * 0'     # 12:30 ART overvalued_list
    - cron: '0 16 * * 0'      # 13:00 ART etf_pulse
    - cron: '30 16 * * 0'     # 13:30 ART momentum_leaders
    - cron: '0 17 * * 0'      # 14:00 ART dcf_vs_analyst_framed
    - cron: '30 17 * * 0'     # 14:30 ART value_vs_growth
    - cron: '0 18 * * 0'      # 15:00 ART weekly_followup
    - cron: '30 18 * * 0'     # 15:30 ART high_roic_cheap
    - cron: '0 19 * * 0'      # 16:00 ART analyst_top_buys
    - cron: '30 19 * * 0'     # 16:30 ART cash_rich
    - cron: '0 20 * * 0'      # 17:00 ART daily_list_rotation
    - cron: '30 20 * * 0'     # 17:30 ART sector_pe_rank
    - cron: '0 21 * * 0'      # 18:00 ART earnings_week_preview
    - cron: '0 2 * * 0'       # 23:00 ART theory_overnight

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Resolve mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
            echo "ticker=${{ github.event.inputs.ticker }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            DOW=$(date -u +%u)  # 1=Mon…5=Fri, 6=Sat, 7=Sun
            echo "Cron fired at UTC ${HOUR}:${MIN} DOW=${DOW}"

            # Exact match on hour:minute:dow — one entry per mode
            # European morning block (8:00–10:45 UTC = 5:00–7:45 ART)
            if   [ "$HOUR" = "8"  ] && [ "$MIN" -lt "15" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="european_open"
            elif [ "$HOUR" = "8"  ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="undervalued_list"
            elif [ "$HOUR" = "9"  ] && [ "$MIN" -lt "15" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="calendar_today"
            elif [ "$HOUR" = "9"  ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="daily_list_rotation"
            elif [ "$HOUR" = "10" ] && [ "$MIN" -lt "15" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="sector_pe_rank"
            elif [ "$HOUR" = "10" ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="calendar_today"
            # US session
            elif [ "$HOUR" = "11" ] && [ "$MIN" -lt "30" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="morning_brief"
            elif [ "$HOUR" = "11" ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="morning_stock_pick"
            elif [ "$HOUR" = "12" ] && [ "$MIN" -lt "30" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="earnings"
            elif [ "$HOUR" = "13" ] && [ "$MIN" -lt "15" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="feature"
            elif [ "$HOUR" = "13" ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="market_open"
            elif [ "$HOUR" = "14" ] && [ "$MIN" -lt "15" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="dcf"
            elif [ "$HOUR" = "14" ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="sector_spotlight"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -lt "10" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="midday_pulse"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="market_vs_model"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="ratio_explained"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -ge "44" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="earnings_week_preview"
            elif [ "$HOUR" = "16" ] && [ "$MIN" -lt "15" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="macro"
            elif [ "$HOUR" = "16" ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="dcf2"
            elif [ "$HOUR" = "17" ] && [ "$MIN" -lt "15" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="etf_pulse"
            elif [ "$HOUR" = "17" ] && [ "$MIN" -ge "29" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="economic_results"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -lt "10" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="dcf_bear"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="movers"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="pre_close"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -ge "44" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="value_vs_growth"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "1" ] || [ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="insider_buy"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="low_52w"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="undervalued_list"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="sector_undervalued"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -ge "44" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="overvalued_list"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "1" ] || [ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="conviction_score"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="biggest_winners_day"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="market_close"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && ([ "$DOW" = "1" ] || [ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="biggest_losers_day"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -ge "44" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="momentum_leaders"
            elif [ "$HOUR" = "21" ] && [ "$MIN" -lt "10" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="after_hours"
            elif [ "$HOUR" = "21" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="cash_rich"
            elif [ "$HOUR" = "21" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="near_52w_high"
            elif [ "$HOUR" = "21" ] && [ "$MIN" -ge "44" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="weekly_followup"
            elif [ "$HOUR" = "22" ] && [ "$MIN" -lt "10" ] && [ "$DOW" = "1" ]; then MODE="dcf_vs_analyst_framed"
            elif [ "$HOUR" = "22" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="etf_vs_etf"
            elif [ "$HOUR" = "22" ] && [ "$MIN" -lt "10" ] && ([ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="profit_forecast_list"
            elif [ "$HOUR" = "22" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="etf_ratio_breakdown"
            elif [ "$HOUR" = "22" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="daily_list_rotation"
            elif [ "$HOUR" = "22" ] && [ "$MIN" -ge "44" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="dividend_value"
            elif [ "$HOUR" = "23" ] && [ "$MIN" -lt "10" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="earnings_results"
            elif [ "$HOUR" = "23" ] && [ "$MIN" -ge "14" ] && [ "$MIN" -lt "25" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="sector_pe_rank"
            elif [ "$HOUR" = "0"  ] && [ "$DOW" -ge "2" ] && [ "$DOW" -le "6" ]; then MODE="quality_rank"
            elif [ "$HOUR" = "1"  ] && [ "$DOW" -ge "2" ] && [ "$DOW" -le "6" ]; then MODE="theory_overnight"
            # New calendar-focused modes
            elif [ "$HOUR" = "0"  ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && [ "$DOW" -ge "2" ] && [ "$DOW" -le "5" ]; then MODE="calendar_tomorrow"
            elif [ "$HOUR" = "11" ] && [ "$MIN" -ge "44" ] && [ "$DOW" -le "5" ] && [ "$DOW" -ge "1" ]; then MODE="macro_preview"
            elif [ "$HOUR" = "23" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && ([ "$DOW" = "2" ] || [ "$DOW" = "4" ]); then MODE="rate_impact"
            elif [ "$HOUR" = "12" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && ([ "$DOW" = "1" ] || [ "$DOW" = "3" ]); then MODE="sector_catalyst"
            elif [ "$HOUR" = "23" ] && [ "$MIN" -ge "44" ] && ([ "$DOW" = "3" ] || [ "$DOW" = "5" ]); then MODE="earnings_surprise_hist"
            # Saturday (DOW=6)
            elif [ "$HOUR" = "13" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="etf_pulse"
            elif [ "$HOUR" = "14" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="feature"
            elif [ "$HOUR" = "14" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="momentum_leaders"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="weekly_wrap"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="overvalued_list"
            elif [ "$HOUR" = "16" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="sector_scan"
            elif [ "$HOUR" = "16" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="analyst_top_buys"
            elif [ "$HOUR" = "17" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="dcf"
            elif [ "$HOUR" = "17" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="cash_rich"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="sentiment"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="value_vs_growth"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="ratio_explained"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="high_roic_cheap"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="sector_momentum_rank"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="quality_rank"
            elif [ "$HOUR" = "21" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "6" ]; then MODE="earnings_week_preview"
            elif [ "$HOUR" = "21" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "6" ]; then MODE="sector_pe_rank"
            elif [ "$HOUR" = "2"  ] && [ "$DOW" = "6" ]; then MODE="theory_overnight"
            # Sunday (DOW=7)
            elif [ "$HOUR" = "13" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "7" ]; then MODE="sentiment"
            elif [ "$HOUR" = "13" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "7" ]; then MODE="undervalued_list"
            elif [ "$HOUR" = "14" ] && [ "$MIN" -lt "15" ] && [ "$DOW" = "7" ]; then MODE="top_undervalued"
            elif [ "$HOUR" = "14" ] && [ "$MIN" -ge "29" ] && [ "$MIN" -lt "40" ] && [ "$DOW" = "7" ]; then MODE="question"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "7" ]; then MODE="sector_scan"
            elif [ "$HOUR" = "15" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "7" ]; then MODE="overvalued_list"
            elif [ "$HOUR" = "16" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "7" ]; then MODE="etf_pulse"
            elif [ "$HOUR" = "16" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "7" ]; then MODE="momentum_leaders"
            elif [ "$HOUR" = "17" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "7" ]; then MODE="dcf_vs_analyst_framed"
            elif [ "$HOUR" = "17" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "7" ]; then MODE="value_vs_growth"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "7" ]; then MODE="weekly_followup"
            elif [ "$HOUR" = "18" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "7" ]; then MODE="high_roic_cheap"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "7" ]; then MODE="analyst_top_buys"
            elif [ "$HOUR" = "19" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "7" ]; then MODE="cash_rich"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -lt "25" ] && [ "$DOW" = "7" ]; then MODE="daily_list_rotation"
            elif [ "$HOUR" = "20" ] && [ "$MIN" -ge "29" ] && [ "$DOW" = "7" ]; then MODE="sector_pe_rank"
            elif [ "$HOUR" = "21" ] && [ "$DOW" = "7" ]; then MODE="earnings_week_preview"
            elif [ "$HOUR" = "2"  ] && [ "$DOW" = "7" ]; then MODE="theory_overnight"
            # Weekday extra: weekly_followup Mon, dividend_value Thu (slot: hour 18, within weekday block)
            else MODE="SKIP"
            fi

            if [ "$MODE" = "SKIP" ] || [ -z "$MODE" ]; then
              echo "No matching mode for UTC ${HOUR}:${MIN} DOW=${DOW} — skipping"
              exit 0
            fi

            echo "mode=${MODE}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "ticker=" >> $GITHUB_OUTPUT
          fi

      - name: Post to X
        if: steps.mode.outputs.mode != ''
        env:
          MODE:                        ${{ steps.mode.outputs.mode }}
          TICKER:                      ${{ steps.mode.outputs.ticker }}
          DRY_RUN:                     ${{ steps.mode.outputs.dry_run }}
          APP_URL:                     https://insic.app
          BUFFER_API_KEY:              ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID:           ${{ secrets.BUFFER_CHANNEL_ID }}
          LINKEDIN_CHANNEL_ID:         ${{ secrets.LINKEDIN_CHANNEL_ID }}
          ALPHA_VANTAGE_KEY:           ${{ secrets.ALPHA_VANTAGE_KEY }}
          AUTOMATION_API_KEY:          ${{ secrets.AUTOMATION_API_KEY }}
          FINNHUB_KEY:                 ${{ secrets.FINNHUB_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:    ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/x-post.mjs
