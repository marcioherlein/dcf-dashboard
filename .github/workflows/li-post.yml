name: LinkedIn Auto-Post

# LinkedIn posts run here (NOT Vercel) — Vercel Hobby silently drops crons beyond its limit.
# Each schedule entry sets LI_MODE env var directly — no time-based detection needed.
# This prevents duplicate posts from GitHub's late-firing cron backfill.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'LinkedIn post mode'
        required: true
        default: 'li_morning_brief'
        type: choice
        options: [
          li_valuation, li_market_wrap, li_deep_dive, li_sector_scan,
          li_morning_brief, li_divergence, li_weekly_picks, li_myth,
          li_conviction, li_etf_scan,
          li_undervalued_list, li_sector_undervalued,
          li_biggest_losers_day, li_biggest_winners_day,
          li_ytd_losers, li_ytd_winners,
          li_near_52w_high, li_most_shorted, li_movers
        ]
      ticker:
        description: 'Ticker override (li_valuation / li_conviction only)'
        required: false
      dry_run:
        description: 'Dry run'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

  # Single dispatcher cron — fires every 15 min, maps time→mode internally.
  schedule:
    - cron: '*/15 * * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Resolve mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
            echo "ticker=${{ github.event.inputs.ticker }}" >> $GITHUB_OUTPUT
          else
            # Map UTC cron time + DOW to mode — single unambiguous match per slot
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            DOW=$(date -u +%u)  # 1=Mon…5=Fri, 6=Sat, 7=Sun
            echo "Cron fired at UTC ${HOUR}:${MIN} DOW=${DOW}"

            case "${HOUR}:${DOW}" in
              "10:"[1-5]) MODE="li_morning_brief" ;;
              "14:1"|"14:3") MODE="li_myth" ;;
              "15:3") if [ "$MIN" -lt "20" ]; then MODE="li_deep_dive"; else MODE="SKIP"; fi ;;
              "15:2"|"15:4") MODE="li_divergence" ;;
              "15:7") MODE="li_etf_scan" ;;
              "16:5") MODE="li_weekly_picks" ;;
              "17:2"|"17:4") MODE="li_conviction" ;;
              "17:7") MODE="li_sector_scan" ;;
              "18:1"|"18:2"|"18:3"|"18:4"|"18:5")
                if [ "$MIN" -lt "20" ]; then MODE="li_undervalued_list"
                else MODE="li_sector_undervalued"
                fi ;;
              "18:6") MODE="li_ytd_losers" ;;
              "19:1"|"19:3"|"19:5") MODE="li_biggest_losers_day" ;;
              "19:2"|"19:4") MODE="li_biggest_winners_day" ;;
              "19:7") MODE="li_ytd_winners" ;;
              "20:1"|"20:2"|"20:3"|"20:4"|"20:5")
                if [ "$MIN" -lt "20" ]; then MODE="li_movers"
                else MODE="li_market_wrap"
                fi ;;
              "20:6") MODE="li_most_shorted" ;;
              "21:"[1-5]) MODE="li_valuation" ;;
              "22:"[1-5]) MODE="li_near_52w_high" ;;
              *) MODE="SKIP" ;;
            esac

            if [ "$MODE" = "SKIP" ]; then
              echo "No matching mode for UTC ${HOUR}:${MIN} DOW=${DOW} — skipping"
              exit 0
            fi

            echo "mode=${MODE}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "ticker=" >> $GITHUB_OUTPUT
          fi

      - name: Post to LinkedIn
        if: steps.mode.outputs.mode != ''
        env:
          MODE:                        ${{ steps.mode.outputs.mode }}
          TICKER:                      ${{ steps.mode.outputs.ticker }}
          DRY_RUN:                     ${{ steps.mode.outputs.dry_run }}
          APP_URL:                     https://insic.app
          BUFFER_API_KEY:              ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID:           ${{ secrets.BUFFER_CHANNEL_ID }}
          LINKEDIN_CHANNEL_ID:         ${{ secrets.LINKEDIN_CHANNEL_ID }}
          ALPHA_VANTAGE_KEY:           ${{ secrets.ALPHA_VANTAGE_KEY }}
          AUTOMATION_API_KEY:          ${{ secrets.AUTOMATION_API_KEY }}
          FINNHUB_KEY:                 ${{ secrets.FINNHUB_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:    ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/x-post.mjs
