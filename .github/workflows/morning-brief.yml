name: Morning Brief

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 7:00 AM ART (UTC-3) Mon–Fri
    - cron: '0 20 * * 1-5'   # 5:00 PM ART (UTC-3) Mon–Fri
  workflow_dispatch:            # manual trigger from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-brief.mjs

      - name: Commit & push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "Morning Brief Bot"
          git add public/briefs/
          git diff --staged --quiet || git commit -m "Brief $(TZ=America/Argentina/Buenos_Aires date +%Y-%m-%d) · Auto-generated"
          git push
