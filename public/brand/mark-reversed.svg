<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Navy field -->
  <rect width="100" height="100" fill="#0F2A5E"/>

  <!-- Value foundation: bottom semicircle, white -->
  <path d="M 12 50 A 38 38 0 0 1 88 50 Z" fill="white"/>

  <!-- The entity: full circle outline, white -->
  <circle cx="50" cy="50" r="38" stroke="white" stroke-width="3.5"/>

  <!-- The threshold: white decision line -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
