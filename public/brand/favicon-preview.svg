<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140" fill="none">
  <!--
    Favicon legibility test
    Three sizes shown: 16px · 32px · 64px
    At 16px the mark simplifies to: solid bottom half + threshold line
  -->

  <!-- Labels -->
  <text x="20" y="14" font-family="monospace" font-size="9" fill="#94a3b8">16 × 16</text>
  <text x="72" y="14" font-family="monospace" font-size="9" fill="#94a3b8">32 × 32</text>
  <text x="140" y="14" font-family="monospace" font-size="9" fill="#94a3b8">64 × 64</text>

  <!-- ── 16×16 version ── centered at (28, 76) -->
  <g transform="translate(20, 20)">
    <path d="M 2 8 A 6 6 0 0 1 14 8 Z" fill="#0F2A5E"/>
    <circle cx="8" cy="8" r="6" stroke="#0F2A5E" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="16" y2="8" stroke="#0F2A5E" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ── 32×32 version ── centered at (88, 60) -->
  <g transform="translate(72, 20)">
    <path d="M 3 16 A 13 13 0 0 1 29 16 Z" fill="#0F2A5E"/>
    <circle cx="16" cy="16" r="13" stroke="#0F2A5E" stroke-width="2"/>
    <line x1="0" y1="16" x2="32" y2="16" stroke="#0F2A5E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ── 64×64 version ── centered at (172, 52) -->
  <g transform="translate(140, 4)">
    <path d="M 6 32 A 26 26 0 0 1 58 32 Z" fill="#0F2A5E"/>
    <circle cx="32" cy="32" r="26" stroke="#0F2A5E" stroke-width="2.5"/>
    <line x1="1" y1="32" x2="63" y2="32" stroke="#0F2A5E" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Separator line -->
  <line x1="10" y1="110" x2="210" y2="110" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Annotation -->
  <text x="10" y="126" font-family="monospace" font-size="8" fill="#94a3b8">
    Bottom half = intrinsic value (solid)
  </text>
  <text x="10" y="137" font-family="monospace" font-size="8" fill="#94a3b8">
    Horizontal line = the threshold (price vs value)
  </text>
</svg>
