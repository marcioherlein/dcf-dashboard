<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!--
    Rationale Capital — Mark
    Concept: The Threshold
    The circle is the stock under analysis. The bottom half (solid) is
    intrinsic value — the computed foundation. The top half is empty —
    price, observable but floating. The horizontal line is the decision
    boundary: the threshold between price and value.
  -->

  <!-- Value foundation: bottom semicircle, solid -->
  <path d="M 12 50 A 38 38 0 0 1 88 50 Z" fill="#0F2A5E"/>

  <!-- The entity: full circle outline -->
  <circle cx="50" cy="50" r="38" stroke="#0F2A5E" stroke-width="3.5"/>

  <!-- The threshold: decision line extending beyond the circle -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#0F2A5E" stroke-width="3" stroke-linecap="round"/>
</svg>
